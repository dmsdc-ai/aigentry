<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; }
  body {
    width: 800px;
    height: 800px;
    overflow: hidden;
    background: #0a0a0a;
  }
  .profile {
    width: 800px;
    height: 800px;
    background:
      radial-gradient(ellipse 70% 60% at 50% 42%, #141018 0%, #0f0b13 35%, #0a0a0a 70%, #060608 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-bottom: 48px;
    position: relative;
    overflow: hidden;
  }

  /* Vignette overlay */
  .profile::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 90% 90% at 50% 50%, transparent 50%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
    z-index: 10;
  }

  /* Subtle rings - more refined opacity */
  .ring {
    position: absolute;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .ring-1 {
    width: 620px; height: 620px;
    border: 1px solid rgba(6, 182, 212, 0.05);
    box-shadow: 0 0 0 1px rgba(6, 182, 212, 0.02) inset;
  }
  .ring-2 {
    width: 490px; height: 490px;
    border: 1px solid rgba(212, 165, 116, 0.05);
  }
  .ring-3 {
    width: 355px; height: 355px;
    border: 1px solid rgba(139, 92, 246, 0.04);
  }
  /* Innermost tight ring — terminal cursor feel */
  .ring-4 {
    width: 230px; height: 230px;
    border: 1px solid rgba(212, 165, 116, 0.08);
  }

  /* Ambient glow volumes — tighter, more precise */
  .glow-gold {
    position: absolute;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212, 165, 116, 0.10) 0%, rgba(212, 165, 116, 0.03) 50%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -52%);
  }
  .glow-cyan-l {
    position: absolute;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(6, 182, 212, 0.10) 0%, rgba(6, 182, 212, 0.03) 55%, transparent 78%);
    top: 36%; left: 34%;
    transform: translate(-50%, -50%);
  }
  .glow-cyan-r {
    position: absolute;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(6, 182, 212, 0.10) 0%, rgba(6, 182, 212, 0.03) 55%, transparent 78%);
    top: 36%; left: 66%;
    transform: translate(-50%, -50%);
  }
  /* Subtle purple tint at bottom — depth layer */
  .glow-deep {
    position: absolute;
    width: 500px; height: 250px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(139, 92, 246, 0.05) 0%, transparent 70%);
    top: 72%; left: 50%;
    transform: translate(-50%, -50%);
  }

  /* The mascot ·⣿· — matching v3 exactly */
  .mascot {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 55px;
  }
  .eye {
    width: 32px;
    height: 32px;
    background: #06b6d4;
    flex-shrink: 0;
    box-shadow:
      0 0 8px rgba(6, 182, 212, 1.0),
      0 0 20px rgba(6, 182, 212, 0.75),
      0 0 42px rgba(6, 182, 212, 0.38),
      0 0 80px rgba(6, 182, 212, 0.14);
  }
  .core {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 0 18px rgba(212, 165, 116, 0.65))
           drop-shadow(0 0 45px rgba(212, 165, 116, 0.28))
           drop-shadow(0 0 90px rgba(212, 165, 116, 0.10));
  }
  .dot {
    width: 48px;
    height: 48px;
    background: #d4a574;
  }

  /* Brand name */
  .brand-wrap {
    position: relative;
    z-index: 2;
    margin-top: 140px;
  }
  .brand {
    position: relative;
    z-index: 2;
    font-family: 'JetBrains Mono', monospace;
    font-size: 100px;
    font-weight: 700;
    letter-spacing: 20px;
    padding-left: 20px;
    display: flex;
    align-items: baseline;
  }

  /* Scattered ASCII particles */
  .particle {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    z-index: 1;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="profile">
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div class="ring ring-4"></div>
  <div class="glow-gold"></div>
  <div class="glow-cyan-l"></div>
  <div class="glow-cyan-r"></div>
  <div class="glow-deep"></div>

  <!-- Ambient far-field particles — sparse, intentional -->
  <div style="position:absolute;inset:0;z-index:1;">
    <!-- Top-left quadrant -->
    <span class="particle" style="top:55px;left:55px;font-size:13px;color:rgba(6,182,212,0.35);">⣿</span>
    <span class="particle" style="top:105px;left:90px;font-size:9px;color:rgba(212,165,116,0.28);">·</span>
    <span class="particle" style="top:165px;left:48px;font-size:11px;color:rgba(139,92,246,0.32);">✦</span>
    <span class="particle" style="top:230px;left:72px;font-size:8px;color:rgba(6,182,212,0.25);">⋅</span>
    <span class="particle" style="top:290px;left:38px;font-size:14px;color:rgba(212,165,116,0.30);">⣾</span>
    <span class="particle" style="top:85px;left:158px;font-size:10px;color:rgba(236,72,153,0.28);">•</span>
    <span class="particle" style="top:195px;left:132px;font-size:12px;color:rgba(6,182,212,0.22);">✧</span>

    <!-- Top-right quadrant -->
    <span class="particle" style="top:60px;left:730px;font-size:12px;color:rgba(212,165,116,0.35);">⠿</span>
    <span class="particle" style="top:115px;left:710px;font-size:9px;color:rgba(6,182,212,0.28);">·</span>
    <span class="particle" style="top:170px;left:745px;font-size:11px;color:rgba(139,92,246,0.30);">✦</span>
    <span class="particle" style="top:240px;left:722px;font-size:8px;color:rgba(212,165,116,0.25);">⋅</span>
    <span class="particle" style="top:300px;left:755px;font-size:14px;color:rgba(6,182,212,0.28);">⣷</span>
    <span class="particle" style="top:90px;left:640px;font-size:10px;color:rgba(251,191,36,0.25);">✧</span>
    <span class="particle" style="top:200px;left:660px;font-size:12px;color:rgba(236,72,153,0.22);">•</span>

    <!-- Bottom-left quadrant -->
    <span class="particle" style="top:520px;left:50px;font-size:13px;color:rgba(139,92,246,0.32);">⣿</span>
    <span class="particle" style="top:580px;left:80px;font-size:9px;color:rgba(6,182,212,0.28);">·</span>
    <span class="particle" style="top:635px;left:45px;font-size:11px;color:rgba(212,165,116,0.30);">✦</span>
    <span class="particle" style="top:695px;left:68px;font-size:8px;color:rgba(6,182,212,0.22);">⋅</span>
    <span class="particle" style="top:745px;left:38px;font-size:14px;color:rgba(236,72,153,0.28);">⣾</span>
    <span class="particle" style="top:555px;left:145px;font-size:10px;color:rgba(212,165,116,0.25);">•</span>

    <!-- Bottom-right quadrant -->
    <span class="particle" style="top:525px;left:740px;font-size:12px;color:rgba(6,182,212,0.30);">⠿</span>
    <span class="particle" style="top:590px;left:720px;font-size:9px;color:rgba(212,165,116,0.28);">·</span>
    <span class="particle" style="top:645px;left:750px;font-size:11px;color:rgba(139,92,246,0.28);">✦</span>
    <span class="particle" style="top:700px;left:728px;font-size:8px;color:rgba(6,182,212,0.22);">⋅</span>
    <span class="particle" style="top:748px;left:755px;font-size:13px;color:rgba(212,165,116,0.30);">⣷</span>
    <span class="particle" style="top:558px;left:648px;font-size:10px;color:rgba(251,191,36,0.22);">•</span>

    <!-- Top-center scattered -->
    <span class="particle" style="top:40px;left:310px;font-size:10px;color:rgba(6,182,212,0.28);">✧</span>
    <span class="particle" style="top:65px;left:420px;font-size:8px;color:rgba(212,165,116,0.22);">·</span>
    <span class="particle" style="top:35px;left:500px;font-size:11px;color:rgba(139,92,246,0.25);">⋅</span>

    <!-- Bottom-center scattered -->
    <span class="particle" style="top:760px;left:290px;font-size:10px;color:rgba(6,182,212,0.25);">•</span>
    <span class="particle" style="top:740px;left:420px;font-size:8px;color:rgba(212,165,116,0.20);">·</span>
    <span class="particle" style="top:755px;left:540px;font-size:11px;color:rgba(139,92,246,0.22);">✦</span>
  </div>

  <div style="position:relative;z-index:2;">
    <!-- Mascot-adjacent particles — close-field, tighter opacity -->
    <span class="particle" style="top:-70px;left:50%;margin-left:-22px;font-size:12px;color:rgba(212,165,116,0.50);">⣾</span>
    <span class="particle" style="top:-60px;left:50%;margin-left:62px;font-size:8px;color:rgba(6,182,212,0.45);">·</span>
    <span class="particle" style="top:-55px;left:50%;margin-left:-78px;font-size:15px;color:rgba(139,92,246,0.50);">✧</span>
    <span class="particle" style="top:-42px;left:50%;margin-left:108px;font-size:10px;color:rgba(236,72,153,0.42);">•</span>
    <span class="particle" style="top:-38px;left:50%;margin-left:-140px;font-size:13px;color:rgba(59,130,246,0.45);">⠿</span>

    <!-- Side particles — mascot level -->
    <span class="particle" style="top:15px;left:50%;margin-left:-250px;font-size:18px;color:rgba(6,182,212,0.55);">⣿</span>
    <span class="particle" style="top:20px;left:50%;margin-left:238px;font-size:15px;color:rgba(212,165,116,0.50);">⠿</span>
    <span class="particle" style="top:65px;left:50%;margin-left:-265px;font-size:11px;color:rgba(236,72,153,0.42);">✧</span>
    <span class="particle" style="top:72px;left:50%;margin-left:252px;font-size:16px;color:rgba(6,182,212,0.48);">✦</span>
    <span class="particle" style="top:108px;left:50%;margin-left:-248px;font-size:13px;color:rgba(212,165,116,0.45);">⣷</span>
    <span class="particle" style="top:118px;left:50%;margin-left:235px;font-size:11px;color:rgba(139,92,246,0.48);">⣾</span>

    <!-- Below mascot -->
    <span class="particle" style="top:155px;left:50%;margin-left:-82px;font-size:11px;color:rgba(6,182,212,0.42);">✧</span>
    <span class="particle" style="top:165px;left:50%;margin-left:-12px;font-size:9px;color:rgba(139,92,246,0.38);">·</span>
    <span class="particle" style="top:148px;left:50%;margin-left:-148px;font-size:13px;color:rgba(249,115,22,0.42);">✦</span>
    <span class="particle" style="top:158px;left:50%;margin-left:118px;font-size:10px;color:rgba(6,182,212,0.45);">•</span>

    <div class="mascot">
      <div class="eye"></div>
      <div class="core">
        <div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div>
      </div>
      <div class="eye"></div>
    </div>
  </div>

  <div class="brand-wrap">
    <!-- Particles above brand — sparse arc -->
    <span class="particle" style="top:-48px;left:30px;font-size:22px;color:rgba(6,182,212,0.70);">⣿</span>
    <span class="particle" style="top:-32px;left:115px;font-size:16px;color:rgba(212,165,116,0.65);">⠿</span>
    <span class="particle" style="top:-55px;left:210px;font-size:18px;color:rgba(139,92,246,0.65);">✦</span>
    <span class="particle" style="top:-22px;left:318px;font-size:13px;color:rgba(6,182,212,0.55);">•</span>
    <span class="particle" style="top:-52px;left:398px;font-size:20px;color:rgba(236,72,153,0.60);">⣾</span>
    <span class="particle" style="top:-62px;left:488px;font-size:15px;color:rgba(212,165,116,0.62);">✧</span>
    <span class="particle" style="top:-28px;left:570px;font-size:17px;color:rgba(59,130,246,0.65);">⠿</span>
    <span class="particle" style="top:-56px;left:655px;font-size:22px;color:rgba(6,182,212,0.58);">⣷</span>
    <span class="particle" style="top:-24px;left:718px;font-size:15px;color:rgba(251,191,36,0.65);">✦</span>

    <!-- Flanking sides -->
    <span class="particle" style="top:12px;left:-55px;font-size:18px;color:rgba(212,165,116,0.52);">⣿</span>
    <span class="particle" style="top:48px;left:-40px;font-size:14px;color:rgba(6,182,212,0.45);">✧</span>
    <span class="particle" style="top:78px;left:-50px;font-size:20px;color:rgba(139,92,246,0.38);">⠿</span>
    <span class="particle" style="top:8px;left:748px;font-size:20px;color:rgba(6,182,212,0.52);">⣾</span>
    <span class="particle" style="top:46px;left:758px;font-size:13px;color:rgba(212,165,116,0.55);">✦</span>
    <span class="particle" style="top:80px;left:742px;font-size:17px;color:rgba(16,185,129,0.42);">•</span>

    <!-- Below brand — sparse -->
    <span class="particle" style="top:105px;left:55px;font-size:14px;color:rgba(59,130,246,0.42);">⣷</span>
    <span class="particle" style="top:118px;left:200px;font-size:13px;color:rgba(6,182,212,0.48);">✧</span>
    <span class="particle" style="top:112px;left:355px;font-size:18px;color:rgba(139,92,246,0.42);">⠿</span>
    <span class="particle" style="top:120px;left:488px;font-size:14px;color:rgba(249,115,22,0.48);">✦</span>
    <span class="particle" style="top:108px;left:612px;font-size:16px;color:rgba(6,182,212,0.55);">•</span>
    <span class="particle" style="top:122px;left:718px;font-size:13px;color:rgba(212,165,116,0.48);">⣾</span>

    <!--
      Brand text: "gradually evolving" — left-to-right evolution
      Letters progress from dim/primitive to bright/luminous
      a=raw,dim  i=emerging  g=forming  e=crystallizing
      n=solidifying  t=glowing  r=radiant  y=fully-evolved
      Each letter gains opacity, color richness, and a subtle text-shadow glow
    -->
    <div class="brand">
      <span style="opacity:0.78;background:linear-gradient(180deg,#b8b8b8 0%,#a0a0a0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">a</span>
      <span style="opacity:0.82;background:linear-gradient(180deg,#c8c0b8 0%,#b0a8a0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">i</span>
      <span style="opacity:0.87;background:linear-gradient(180deg,#d8ccbe 0%,#c8b8a8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">g</span>
      <span style="opacity:0.90;background:linear-gradient(180deg,#e2d8cc 0%,#d4c8b8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">e</span>
      <span style="opacity:0.93;background:linear-gradient(180deg,#ece4d8 0%,#e0d6c8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">n</span>
      <span style="opacity:0.96;background:linear-gradient(180deg,#f4ede4 0%,#ece4d8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 6px rgba(212,165,116,0.20));">t</span>
      <span style="opacity:0.98;background:linear-gradient(180deg,#fff8f0 0%,#f4ece2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 10px rgba(212,165,116,0.28));">r</span>
      <span style="opacity:1.0;background:linear-gradient(180deg,#ffffff 0%,#eef8fa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 14px rgba(6,182,212,0.25)) drop-shadow(0 0 28px rgba(212,165,116,0.15));">y</span>
    </div>
  </div>
</div>
</body>
</html>
