<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; }
  body {
    width: 800px;
    height: 800px;
    overflow: hidden;
    background: #0a0a0a;
  }
  .profile {
    width: 800px;
    height: 800px;
    background: radial-gradient(circle at 50% 45%, #111015 0%, #0d0a10 40%, #0a0a0a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Subtle rings */
  .ring {
    position: absolute;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .ring-1 {
    width: 600px; height: 600px;
    border: 1px solid rgba(6, 182, 212, 0.06);
  }
  .ring-2 {
    width: 480px; height: 480px;
    border: 1px solid rgba(212, 165, 116, 0.06);
  }
  .ring-3 {
    width: 350px; height: 350px;
    border: 1px solid rgba(6, 182, 212, 0.04);
  }

  /* Glow behind mascot */
  .glow-gold {
    position: absolute;
    width: 375px; height: 375px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212, 165, 116, 0.12), transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .glow-cyan-l {
    position: absolute;
    width: 188px; height: 188px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(6, 182, 212, 0.1), transparent 70%);
    top: 42%; left: 30%;
    transform: translate(-50%, -50%);
  }
  .glow-cyan-r {
    position: absolute;
    width: 188px; height: 188px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(6, 182, 212, 0.1), transparent 70%);
    top: 42%; left: 70%;
    transform: translate(-50%, -50%);
  }

  /* The mascot ·⣿· */
  .mascot {
    position: relative;
    z-index: 2;
    font-family: 'JetBrains Mono', monospace;
    font-size: 225px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0px;
  }
  .eye {
    color: #06b6d4;
    text-shadow: 0 0 38px rgba(6, 182, 212, 0.6), 0 0 75px rgba(6, 182, 212, 0.3);
  }
  .core {
    color: #d4a574;
    text-shadow: 0 0 38px rgba(212, 165, 116, 0.5), 0 0 75px rgba(212, 165, 116, 0.2);
  }

  /* Brand name container */
  .brand-wrap {
    position: relative;
    z-index: 2;
    margin-top: 109px;
  }
  .brand {
    position: relative;
    z-index: 2;
    font-family: 'JetBrains Mono', -apple-system, sans-serif;
    font-size: 100px;
    font-weight: 700;
    letter-spacing: 20px;
    background: linear-gradient(135deg, #ffffff 0%, #e5e5e5 40%, #d4d4d4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Scattered ASCII particles */
  .particle {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    z-index: 1;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="profile">
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div class="glow-gold"></div>
  <div class="glow-cyan-l"></div>
  <div class="glow-cyan-r"></div>

  <div style="position:relative;z-index:2;">
    <!-- Outer scatter - far ring (natural random spread) -->

    <!-- Close scatter - near mascot edges -->
    <span class="particle" style="top:-30px;left:50%;margin-left:-135px;font-size:24px;color:rgba(212,165,116,0.75);">⣿</span>
    <span class="particle" style="top:-25px;left:50%;margin-left:125px;font-size:20px;color:rgba(6,182,212,0.7);">⣿</span>

    <span class="particle" style="top:95px;left:50%;margin-left:-210px;font-size:18px;color:rgba(6,182,212,0.65);">✧</span>
    <span class="particle" style="top:105px;left:50%;margin-left:195px;font-size:22px;color:rgba(236,72,153,0.6);">⣷</span>
    <span class="particle" style="top:150px;left:50%;margin-left:-155px;font-size:12px;color:rgba(59,130,246,0.6);">•</span>

    <!-- Bottom scatter -->
    <span class="particle" style="top:185px;left:50%;margin-left:-90px;font-size:14px;color:rgba(6,182,212,0.55);">✧</span>
    <span class="particle" style="top:200px;left:50%;margin-left:-20px;font-size:11px;color:rgba(139,92,246,0.5);">·</span>
    <span class="particle" style="top:175px;left:50%;margin-left:-170px;font-size:16px;color:rgba(249,115,22,0.55);">✦</span>
    <span class="particle" style="top:180px;left:50%;margin-left:155px;font-size:13px;color:rgba(6,182,212,0.6);">•</span>
    <span class="particle" style="top:210px;left:50%;margin-left:100px;font-size:10px;color:rgba(212,165,116,0.45);">⋅</span>
    <span class="particle" style="top:205px;left:50%;margin-left:-120px;font-size:12px;color:rgba(16,185,129,0.5);">°</span>

    <div class="mascot">
      <span class="eye">·</span><span class="core">⣿</span><span class="eye">·</span>
    </div>
  </div>

  <div class="brand-wrap">
    <!-- Top scatter -->
    <span class="particle" style="top:-40px;left:-40px;font-size:28px;color:rgba(6,182,212,0.85);">⣿</span>
    <span class="particle" style="top:-25px;left:60px;font-size:20px;color:rgba(212,165,116,0.8);">⠿</span>
    <span class="particle" style="top:-55px;left:150px;font-size:22px;color:rgba(139,92,246,0.8);">✦</span>

    <span class="particle" style="top:50px;left:750px;font-size:16px;color:rgba(212,165,116,0.65);">✦</span>
    <span class="particle" style="top:82px;left:735px;font-size:20px;color:rgba(16,185,129,0.5);">•</span>

    <!-- Bottom scatter -->

    <span class="particle" style="top:115px;left:70px;font-size:24px;color:rgba(212,165,116,0.55);">⣿</span>

    <span class="particle" style="top:118px;left:420px;font-size:18px;color:rgba(249,115,22,0.6);">✦</span>
    <span class="particle" style="top:110px;left:530px;font-size:20px;color:rgba(6,182,212,0.7);">•</span>
    <span class="particle" style="top:130px;left:630px;font-size:16px;color:rgba(212,165,116,0.6);">⣾</span>
    <span class="particle" style="top:112px;left:720px;font-size:22px;color:rgba(236,72,153,0.45);">✧</span>

    <!-- Inner particles (near text edges) -->
    <span class="particle" style="top:-10px;left:20px;font-size:12px;color:rgba(212,165,116,0.4);">⋅</span>
    <span class="particle" style="top:-8px;left:380px;font-size:14px;color:rgba(6,182,212,0.4);">·</span>
    <span class="particle" style="top:-12px;left:680px;font-size:12px;color:rgba(251,191,36,0.4);">°</span>

    <div class="brand">aigentry</div>

</div>
</body>
</html>
